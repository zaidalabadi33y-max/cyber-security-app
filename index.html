<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentryGuard Ultra | Final Edition v15.0</title>
    <style>
        :root {
            --bg-black: #050505; --card-dark: #0d0d0d;
            --neon-green: #00ff88; --admin-red: #ff3333;
            --gold: #ffcc00; --blue: #00ccff; --text-gray: #a0a0a0;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-black); color: white; margin: 0; overflow-x: hidden; }
        .container { padding: 15px; max-width: 800px; margin: auto; }

        /* شاشة القفل */
        #overlay { position: fixed; inset: 0; background: var(--bg-black); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .lock-box { background: var(--card-dark); padding: 30px; border-radius: 25px; border: 1px solid #1a1a1a; text-align: center; width: 85%; max-width: 420px; box-shadow: 0 0 30px rgba(0,0,0,1); }
        
        .colored-name { color: var(--neon-green); font-weight: bold; }
        .price-label { color: var(--gold); }
        .price-value { color: var(--blue); }

        input { background: #000; border: 1px solid #333; color: var(--neon-green); padding: 15px; border-radius: 12px; width: 90%; text-align: center; margin-bottom: 15px; font-size: 1.1rem; }
        
        button { cursor: pointer; border-radius: 12px; font-weight: bold; transition: 0.2s; padding: 12px; border: none; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: #1a1a1a; color: var(--neon-green); border: 1px solid #333; }
        .btn-tele { background: #0088cc; color: white; text-decoration: none; font-size: 0.9rem; }

        /* لوحة العمليات */
        .dashboard-card { background: var(--card-dark); border: 1px solid #222; padding: 20px; border-radius: 20px; text-align: center; margin-top: 10px; }
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .tool-item { background: #111; border: 1px solid #222; padding: 15px; border-radius: 15px; font-size: 0.85rem; transition: 0.3s; cursor: pointer; }
        .tool-item:hover { border-color: var(--neon-green); background: #001a0d; }

        /* نافذة فحص الروابط (جديد) */
        #scannerModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; align-items: center; justify-content: center; }
        .scanner-box { background: var(--card-dark); padding: 25px; border-radius: 20px; border: 1px solid var(--neon-green); width: 90%; max-width: 400px; text-align: center; }

        #adminPanel { background: #080808; border: 1px solid var(--admin-red); padding: 20px; border-radius: 20px; margin-top: 25px; display: none; }
        .key-item { background: #000; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .copy-btn { background: #222; color: var(--gold); font-size: 0.7rem; padding: 5px; width: auto; display: inline-flex; margin-right: 10px; }

        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="scannerModal">
        <div class="scanner-box">
            <h3 style="color: var(--neon-green);">محلل الروابط الذكي</h3>
            <input type="text" id="urlInput" placeholder="ضع الرابط هنا (https://...)" style="font-size: 0.9rem;">
            <button class="btn-main" onclick="scanURL()">بدء الفحص 🔍</button>
            <div id="scanResult" style="margin-top:15px; font-size:0.9rem;"></div>
            <button onclick="closeScanner()" style="background:transparent; color:gray; font-size:0.8rem; border:none; margin-top:10px;">إغلاق</button>
        </div>
    </div>

    <div id="overlay">
        <div class="lock-box">
            <h1 style="margin:0; letter-spacing: 2px;">SENTRY<span style="color:var(--neon-green)">GUARD</span></h1>
            <p style="color:var(--text-gray); font-size: 0.8rem; margin-bottom: 20px;">نظام الحماية المطور - نسخة <span class="colored-name">عباس ماجد</span></p>
            
            <input type="text" id="activationKey" placeholder="أدخل الكود هنا">
            <button class="btn-main" onclick="vibrateDevice(); checkKey();">تفعيل الآن 🔓</button>

            <div style="background: #000; border-radius: 15px; padding: 15px; margin: 15px 0; border: 1px solid #222; text-align: right;">
                <div style="text-align:center; color: var(--text-gray); font-size: 0.8rem; margin-bottom: 10px;">💳 خطط الاشتراك</div>
                <div style="display:flex; justify-content:space-between; font-size: 0.85rem; margin-bottom: 5px;">
                    <span class="price-label">إسبوعي</span> <span class="price-value">5$</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size: 0.85rem; margin-bottom: 5px;">
                    <span class="price-label">شهري</span> <span class="price-value">15$</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size: 0.85rem;">
                    <span class="price-label">سنوي</span> <span class="price-value">70$</span>
                </div>
            </div>
            <a href="https://t.me/D_8_5" class="btn-tele" onclick="vibrateDevice();" target="_blank">✈️ تواصل مع المطور</a>
        </div>
    </div>

    <div id="mainApp" class="container" style="display:none;">
        <div style="background: var(--card-dark); border: 1px solid #222; padding: 15px; border-radius: 15px; text-align:center; margin-bottom: 15px;">
             🛡️ <span class="colored-name">SENTRYGUARD ULTRA</span> | الحالة: <span id="daysLeft" style="color:var(--blue)">--</span>
        </div>

        <div class="dashboard-card">
            <div class="tool-grid">
                <div class="tool-item" onclick="vibrateDevice(); alert('جاري فحص النظام...')"><span>🔍</span><br>فحص شامل</div>
                <div class="tool-item" onclick="vibrateDevice(); alert('جاري التشفير...')"><span>🔐</span><br>تشفير IP</div>
                <div class="tool-item" onclick="vibrateDevice(); alert('تم تنظيف الملفات')"><span>🧹</span><br>تنظيف الأثر</div>
                <div class="tool-item" onclick="openScanner()"><span>🌐</span><br>أمن الويب</div>
            </div>
            <div style="margin-top:20px; font-size:0.7rem; color:var(--text-gray);">الوقت: <span id="liveClock"></span></div>
        </div>

        <div id="adminPanel">
            <h3 style="color: var(--admin-red);">لوحة التحكم</h3>
            <div style="display:flex; gap:10px;">
                <input type="number" id="daysInput" placeholder="أيام" style="width: 30%;">
                <button class="btn-main" onclick="generateKey()" style="background:var(--admin-red); color:white;">صنع كود</button>
            </div>
            <div id="keyList"></div>
        </div>
    </div>

    <script>
        const TELE_TOKEN = "8394196695:AAGcQy1Pyy5A7VqBxrL4fBm-w9eyTTXUQ6M";
        const TELE_ID = "1487040062";
        const MASTER_ADMIN = "abbas-majed-ganem-hadi";
        const PUBLIC_CODE = "2007125197450";

        let subData = JSON.parse(localStorage.getItem('subData')) || [];
        const deviceID = btoa(navigator.userAgent).substring(15, 25);

        function vibrateDevice() { if (navigator.vibrate) navigator.vibrate(50); }

        function openScanner() { vibrateDevice(); document.getElementById('scannerModal').style.display = 'flex'; }
        function closeScanner() { document.getElementById('scannerModal').style.display = 'none'; }

        function scanURL() {
            const url = document.getElementById('urlInput').value;
            const res = document.getElementById('scanResult');
            if(!url) return alert("أدخل رابطاً أولاً!");
            
            res.innerHTML = "جاري تحليل الرابط... ⏳";
            setTimeout(() => {
                if(url.includes("bit.ly") || url.includes("hack")) {
                    res.innerHTML = "<span style='color:red;'>⚠️ تنبيه: الرابط مشبوه أو يحتوي على برمجيات خبيثة!</span>";
                } else {
                    res.innerHTML = "<span style='color:var(--neon-green);'>✅ الرابط آمن: لم يتم العثور على تهديدات.</span>";
                }
            }, 2000);
        }

        async function sendTeleMsg(msg) {
            const url = `https://api.telegram.org/bot${TELE_TOKEN}/sendMessage?chat_id=${TELE_ID}&text=${encodeURIComponent(msg)}`;
            try { await fetch(url); } catch(e) {}
        }

        function checkKey() {
            const input = document.getElementById('activationKey').value;
            if (input === MASTER_ADMIN) { launch(true, "صلاحيات كاملة"); return; }
            if (input === PUBLIC_CODE) { launch(false, "مدى الحياة"); return; }
            
            let user = subData.find(i => i.key === input);
            if (user && Date.now() <= user.expiry) { launch(false, "نشط"); } 
            else { alert("الكود خطأ!"); }
        }

        function launch(isAdmin, time) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            if(isAdmin) document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('daysLeft').innerText = time;
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000);
        }

        function generateKey() {
            const d = document.getElementById('daysInput').value || 30;
            const k = "SG-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            subData.push({ key: k, expiry: Date.now() + (d * 86400000) });
            localStorage.setItem('subData', JSON.stringify(subData));
            updateList();
        }

        function updateList() {
            const list = document.getElementById('keyList');
            list.innerHTML = "";
            subData.forEach(u => {
                list.innerHTML += `<div class="key-item">${u.key} <button class="copy-btn" onclick="navigator.clipboard.writeText('${u.key}'); alert('تم النسخ')">نسخ</button></div>`;
            });
        }
    </script>
</body>
</html>
