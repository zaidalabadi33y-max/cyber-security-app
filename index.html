<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dark Security Military Edition</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>

<style>

body{
margin:0;
font-family:tahoma;
background:#020202;
color:#fff;
text-align:center;
}

:root{
--main:#00ffaa;
}

h2{
color:var(--main);
}

input,button{
width:90%;
max-width:320px;
padding:12px;
margin:8px;
border-radius:8px;
border:1px solid var(--main);
background:transparent;
color:white;
}

button{
background:var(--main);
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#log{
background:black;
margin-top:20px;
padding:10px;
height:140px;
overflow:auto;
font-size:12px;
text-align:right;
}

.floating{
position:fixed;
bottom:25px;
right:25px;
background:var(--main);
padding:20px;
border-radius:50%;
cursor:pointer;
font-size:22px;
}

</style>
</head>

<body>

<h2>🛡️ Dark Security Military Engine</h2>

<input id="code" placeholder="كود التفعيل">
<button onclick="login()">دخول</button>

<hr>

<div id="app" style="display:none">

<input type="file" id="fileInput">
<button onclick="scanFile()">🔑 فحص الملف (SHA256 + Risk)</button>

<br>

<button onclick="scanQR()">📷 فحص QR</button>

<br>

<input id="textInput" placeholder="اكتب نص للتحليل">
<button onclick="aiScan()">🧠 تحليل أمني ذكي</button>

<br>

<button onclick="generateReport()">📄 توليد تقرير أمني</button>

<div id="qrContainer"></div>

<div id="log">جاهز...</div>

</div>

<div class="floating" onclick="quickScan()">🔍</div>

<script>

/* LOGIN */
function login(){
let code=document.getElementById("code").value;

if(code==="dark-dark"){
document.getElementById("app").style.display="block";
}
else alert("كود غير صحيح");
}

/* LOG */
function log(msg){
let box=document.getElementById("log");
box.innerHTML="> "+msg+"<br>"+box.innerHTML;
}

/* Military File Scanner */
function scanFile(){

let file=document.getElementById("fileInput").files[0];

if(!file){
alert("اختر ملف أولاً");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let hash=sha256(e.target.result);

/* Risk heuristic */
let risk=0;

if(file.name.includes(".exe")) risk+=30;
if(file.name.split(".").length>2) risk+=40;

alert("SHA256:\n"+hash+"\nRisk Score: "+Math.min(risk,95)+"%");

log("تم فحص الملف عسكرياً");
};

reader.readAsArrayBuffer(file);
}

/* QR Scanner */
function scanQR(){

let container=document.getElementById("qrContainer");
container.innerHTML="<div id='qr'></div>";

let scanner=new Html5Qrcode("qr");

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
text=>{
let risk=0;

if(text.includes("http")) risk+=20;
if(text.includes("login")) risk+=25;

alert("QR Content:\n"+text+"\nRisk : "+risk+"%");
scanner.stop();

log("فحص QR مكتمل");
},
()=>{}
);
}

/* AI Scam Detector */
function aiScan(){

let text=document.getElementById("textInput").value;

if(!text){
alert("اكتب نص");
return;
}

let risk=0;

let scamPatterns=[
"free","win","prize","urgent",
"bank","verify","password",
"lottery","update"
];

scamPatterns.forEach(p=>{
if(text.toLowerCase().includes(p))
risk+=12;
});

risk=Math.min(risk,95);

alert("AI Risk Probability : "+risk+"%");
log("تحليل ذكاء أمني");
}

/* Report PDF */
function generateReport(){

let doc={
content:[
{text:"Dark Security Military Report",fontSize:20},
"----------------------",
"Security Scan Completed"
]
};

pdfMake.createPdf(doc).download("military_report.pdf");

log("تم توليد التقرير");
}

/* Quick Scan */
function quickScan(){
alert("Quick Scan Completed\nNo Threats Found");
}

</script>

</body>
</html>
