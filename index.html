<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الضلع - لوحة التحكم</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        header { background: #ff9800; color: white; padding: 15 shadow; text-align: center; border-radius: 10px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-add { background: #4CAF50; color: white; width: 100%; margin-bottom: 20px; font-size: 18px; }
        .btn-edit { background: #2196F3; color: white; margin-left: 5px; }
        .btn-delete { background: #f44336; color: white; }
        .btn-order { background: #ff9800; color: white; }
        .modal { background: white; padding: 20px; border-radius: 10px; border: 1px solid #ccc; margin-top: 20px; }
        input { width: 95%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🍕 مطعم الضلع 🍔</h1>
        <p>لوحة التحكم والمنيو</p>
    </header>

    <div id="admin-section">
        <h3>قسم الإدمن - إضافة وجبة</h3>
        <input type="text" id="pName" placeholder="اسم الأكلة">
        <input type="text" id="pPrice" placeholder="السعر">
        <input type="text" id="pImage" placeholder="رابط صورة الأكلة (اختياري)">
        <button class="btn btn-add" onclick="addProduct()">إضافة للمنيو</button>
    </div>

    <hr>

    <h3>قائمة الطعام (عرض الزبون)</h3>
    <div id="productList">
        </div>
</div>

<script>
    // قاعدة بيانات وهمية في الذاكرة
    let products = [
        { id: 1, name: "كباب عراقي", price: "12000", image: "https://images.unsplash.com/photo-1544025162-d76694265947?w=200" },
        { id: 2, name: "شاورما دجاج", price: "5000", image: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200" }
    ];

    function renderProducts() {
        const list = document.getElementById('productList');
        list.innerHTML = "";
        products.forEach((p, index) => {
            list.innerHTML += `
                <div class="card">
                    <img src="${p.image}" alt="food">
                    <div>
                        <strong>${p.name}</strong><br>
                        <span>السعر: ${p.price} د.ع</span>
                    </div>
                    <div>
                        <button class="btn btn-order" onclick="makeOrder('${p.name}')">طلب</button>
                        <button class="btn btn-edit" onclick="editProduct(${index})">تعديل</button>
                        <button class="btn btn-delete" onclick="deleteProduct(${index})">حذف</button>
                    </div>
                </div>
            `;
        });
    }

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImage').value || "https://via.placeholder.com/80";
        
        if(name && price) {
            products.push({ id: Date.now(), name: name, price: price, image: img });
            renderProducts();
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
        }
    }

    function deleteProduct(index) {
        products.splice(index, 1);
        renderProducts();
    }

    function editProduct(index) {
        let newPrice = prompt("أدخل السعر الجديد لـ " + products[index].name);
        if (newPrice) {
            products[index].price = newPrice;
            renderProducts();
        }
    }

    function makeOrder(name) {
        let phone = prompt("أدخل رقم هاتفك لطلب " + name);
        let location = prompt("أدخل أقرب نقطة دالة");
        if(phone && location) {
            alert("✅ تم إرسال الطلب بنجاح!\nالأكلة: " + name + "\nالرقم: " + phone + "\nالمكان: " + location);
        }
    }

    // تشغيل العرض عند فتح الصفحة
    renderProducts();
</script>

</body>
</html>
