<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي لطلبة الإعدادية - العراق</title>
        <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .input-area {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            resize: vertical;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .response-area {
            background: #e8f6f3;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #d1f2eb;
            white-space: pre-wrap; /* للحفاظ على تنسيق الأسطر */
            line-height: 1.6;
        }
        .loading {
            text-align: center;
            display: none;
            color: #e67e22;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 المساعد الذكي لطلبة الإعدادية</h1>
        <p style="text-align: center; color: #777;">أدخل سؤالك أو نص المادة للحصول على تلخيص، حل، أو أسئلة وزارية.</p>
        
        <div class="input-area">
            <label for="userInput">السؤال أو النص:</label>
            <textarea id="userInput" placeholder="مثال: ما هي وظيفة الميتوكوندريا؟ أو اكتب سؤالاً وزارياً..."></textarea>
        </div>
        
        <button onclick="getAssistantResponse()">🔍 إرسال وطلب الإجابة</button>
        
        <div class="loading" id="loadingDiv">
            جاري التفكير والبحث... يرجى الانتظار ⏳
        </div>
        
        <hr style="margin: 20px 0;">
        
        <h3>📝 الإجابة:</h3>
        <div class="response-area" id="responseDiv">
            ستظهر الإجابة هنا بعد المعالجة...
        </div>
    </div>
        <script>
        // إعدادات الـ API
        // تحذير: لا تشارك هذا المفتاح مع أحد
        const API_KEY = "YOUR_API_KEY_HERE"; // ضع مفتاحك الجديد هنا
        const API_URL = "https://api.openai.com/v1/chat/completions";

        // تعريف الشخصية والتعليمات (System Prompt)
        const systemPrompt = `
            أنت "المساعد الذكي لطلبة الإعدادية في العراق". مهمتك هي تحليل النصوص وتقديم مساعدة تعليمية دقيقة.
            
            المميزات المطلوبة:
            1. التلخيص: تحويل المادة إلى نقاط مركزة (تعاريف، تعاليل).
            2. الاختبار: توليد أسئلة MCQ وصح وخطأ.
            3. حل المسائل: حل مسائل الفيزياء والكيمياء والرياضيات بخطوات تفصيلية.
            4. الخرائط الذهنية: وصف هيكلية الموضوع.
            5. التدقيق اللغوي: تصحيح مواضيع الإنشاء.
            
            الميزة الذهبية (الوزاريات):
            - إذا كان السؤال وزارياً، حدد السنة والدور (مثلاً: 2019 دور أول).
            - اذكر إذا كان السؤال مكرراً في سنوات أخرى.
            
            أسلوب الإجابة:
            - استخدم اللغة العربية الفصحى المبسطة مع لمحة تشجيعية.
            - اجعل الإجابة منظمة جداً باستخدام الجداول والنقاط.
            - إذا كانت المادة "أحياء"، ركز على "موقع ووظيفة".
        `;
                async function getAssistantResponse() {
            const userText = document.getElementById('userInput').value;
            const responseDiv = document.getElementById('responseDiv');
            const loadingDiv = document.getElementById('loadingDiv');

            if (!userText.trim()) {
                alert("الرجاء كتابة سؤال أو نص أولاً!");
                return;
            }

            // إظهار رسالة التحميل
            loadingDiv.style.display = 'block';
            responseDiv.innerText = "جاري تجهيز الإجابة...";

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o", // أو gpt-3.5-turbo
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userText }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();

                if (data.error) {
                    responseDiv.innerText = "حدث خطأ: " + data.error.message;
                } else {
                    const reply = data.choices[0].message.content;
                    responseDiv.innerText = reply;
                }
            } catch (error) {
                responseDiv.innerText = "حدث خطأ في الاتصال. تأكد من المفتاح أو الانترنت.";
                console.error(error);
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
    </script>
</body>
                </html>
