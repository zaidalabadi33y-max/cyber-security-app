<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق منيو حمادة الشامل - النسخة الملكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: all 0.3s ease; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* أنيميشن الدخول */
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .scale-in { animation: scaleIn 0.3s ease-out; }

        /* زر الحظ - نبض */
        .lucky-button {
            background: linear-gradient(45deg, #ff930f, #ff1b6b);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 27, 107, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(255, 27, 107, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 27, 107, 0); }
        }

        /* وضع الليلي */
        .dark-mode { background-color: #121212 !important; color: #fff; }
        .dark-mode .bg-white { background-color: #1e1e1e !important; border-color: #333; }
        .dark-mode .text-gray-800 { color: #fff !important; }
        .dark-mode .bg-gray-50 { background-color: #121212 !important; }
        .dark-mode .bg-gray-100 { background-color: #2d2d2d !important; color: #fff; }

        /* تذكرة الخصم */
        .badge-discount {
            position: absolute; top: -5px; left: -5px;
            background: #ef4444; color: white; padding: 2px 8px;
            border-radius: 10px; font-size: 10px; font-weight: bold;
            z-index: 10; transform: rotate(-10deg);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .modal-active { display: flex !important; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 pb-44" id="mainBody">

    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm border-b border-gray-100">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-orange-200 rotate-3">
                        <span class="font-black text-xl italic">ح</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-black text-gray-800">منيو حمادة</h1>
                        <p class="text-[10px] text-orange-500 font-bold uppercase tracking-widest">Premium Service</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleDarkMode()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center active:scale-90 transition-all">🌙</button>
                    <div class="bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-xs font-bold border border-orange-100">طاولة 1</div>
                </div>
            </div>

            <div class="relative group">
                <input type="text" id="searchInput" onkeyup="filterMenu()" placeholder="شنو ببالك تاكل اليوم؟" 
                       class="w-full bg-gray-100 border-none rounded-2xl py-3 pr-12 pl-4 text-sm focus:ring-2 focus:ring-orange-500 transition-all outline-none">
                <span class="absolute right-4 top-3 text-gray-400 text-lg">🔍</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <div class="mb-6">
            <button onclick="pickLuckyFood()" class="lucky-button w-full py-4 rounded-2xl text-white font-black shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
                <span>🎲</span>
                <span>محتار شتاكل؟ خل حمادة يختارلك!</span>
            </button>
        </div>

        <div class="flex gap-2 overflow-x-auto mb-6 no-scrollbar py-2">
            <button onclick="filterType('all')" class="bg-orange-500 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg shadow-orange-100 whitespace-nowrap">الكل</button>
            <button onclick="filterType('مندي')" class="bg-white text-gray-500 border border-gray-100 px-6 py-2 rounded-xl text-sm font-bold whitespace-nowrap">المندي</button>
            <button onclick="filterType('شاورما')" class="bg-white text-gray-500 border border-gray-100 px-6 py-2 rounded-xl text-sm font-bold whitespace-nowrap">الشاورما</button>
            <button onclick="filterType('مقبلات')" class="bg-white text-gray-500 border border-gray-100 px-6 py-2 rounded-xl text-sm font-bold whitespace-nowrap">المقبلات</button>
            <button onclick="filterType('مشروب')" class="bg-white text-gray-500 border border-gray-100 px-6 py-2 rounded-xl text-sm font-bold whitespace-nowrap">المشروبات</button>
        </div>

        <div id="menu-container" class="space-y-4">
            </div>
    </main>

    <div class="fixed bottom-36 left-6 z-[60]">
        <button onclick="callForBill()" class="w-14 h-14 bg-white text-gray-800 rounded-full shadow-2xl border border-gray-100 flex items-center justify-center text-2xl active:scale-90 transition-all hover:bg-gray-50">
            🧾
        </button>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-gray-100 rounded-t-[2.5rem] shadow-2xl z-50">
        <div class="max-w-md mx-auto flex items-center justify-between gap-4">
            <div class="flex flex-col">
                <span class="text-gray-400 text-xs font-bold uppercase">المجموع الكلي</span>
                <span id="totalPrice" class="text-2xl font-black text-gray-800">0 <span class="text-xs">د.ع</span></span>
            </div>
            <button onclick="confirmOrder()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-orange-200 flex justify-center items-center gap-2 active:scale-95 transition-all">
                <span>تأكيد الطلب</span>
                <span id="itemCount" class="bg-white/20 px-2 py-0.5 rounded-lg text-xs">0 قطع</span>
            </button>
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-xs rounded-[3rem] p-10 text-center shadow-2xl scale-in">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-2xl font-black text-gray-800 mb-2">عاشت إيدك!</h2>
            <p class="text-gray-500 text-sm mb-6">طلبك صار بالمطبخ، دقايق ويكون عندك يا بطل.</p>
            <button onclick="closeModal()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-100">تم</button>
        </div>
    </div>

    <script>
        // قاعدة البيانات الشاملة
        const foods = [
            { id: 1, name: "مندي لحم", price: 18000, type: "مندي", img: "https://images.unsplash.com/photo-1633945274405-b6c8069047b0?w=200", stars: 5, time: "25 دقيقة" },
            { id: 2, name: "مندي دجاج كامل", price: 15000, type: "مندي", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=200", stars: 5, time: "20 دقيقة" },
            { id: 3, name: "مندي دجاج نص", price: 8000, type: "مندي", img: "https://images.unsplash.com/photo-1610057099443-fde8c4d50f91?w=200", stars: 4, time: "15 دقيقة" },
            { id: 4, name: "شاورما لحم (عرض)", price: 2500, type: "شاورما", img: "https://images.unsplash.com/photo-1633383718081-22ac93e3dbf1?w=200", stars: 4, time: "5 دقيقة", discount: "خصم %20" },
            { id: 5, name: "شاورما دجاج", price: 2000, type: "شاورما", img: "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=200", stars: 4, time: "5 دقيقة" },
            { id: 6, name: "باذنجانية ملكية", price: 1500, type: "مقبلات", img: "https://images.unsplash.com/photo-1540420773420-3366772f4999?w=200", stars: 5, time: "2 دقيقة" },
            { id: 7, name: "مقبلات تفاحية", price: 1500, type: "مقبلات", img: "https://images.unsplash.com/photo-1550304943-4f24f54ddde9?w=200", stars: 4, time: "2 دقيقة" },
            { id: 8, name: "بيبسي بارد", price: 500, type: "مشروب", img: "https://images.unsplash.com/photo-1629203851022-39c6f254689d?w=200", stars: 5, time: "1 دقيقة" },
            { id: 9, name: "ماء معدني", price: 250, type: "مشروب", img: "https://images.unsplash.com/photo-1564419320461-6870880221ad?w=200", stars: 5, time: "1 دقيقة" }
        ];

        let cart = {};

        // وظيفة عرض المنيو
        function renderMenu(items = foods) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(food => `
                <div class="food-card bg-white rounded-[2rem] p-3 shadow-sm border border-gray-100 flex items-center gap-4 relative transition-all active:scale-[0.98]">
                    ${food.discount ? `<span class="badge-discount">${food.discount}</span>` : ''}
                    <img src="${food.img}" class="w-24 h-24 rounded-[1.5rem] object-cover shadow-md">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h3 class="text-gray-800 font-bold text-lg leading-tight">${food.name}</h3>
                            <span class="text-[10px] text-gray-400 font-bold">🕒 ${food.time}</span>
                        </div>
                        <div class="flex text-yellow-400 text-[10px] mb-1">
                            ${'★'.repeat(food.stars)}${'☆'.repeat(5-food.stars)}
                        </div>
                        <p class="text-orange-600 font-black text-sm">${food.price.toLocaleString()} د.ع</p>
                        <div class="flex items-center gap-3 mt-2">
                            <button onclick="updateQty(${food.id}, -1)" class="w-9 h-9 bg-gray-100 rounded-xl font-bold flex items-center justify-center text-gray-600 active:bg-gray-200">-</button>
                            <span id="qty-${food.id}" class="font-bold text-sm w-4 text-center">${cart[food.id] || 0}</span>
                            <button onclick="updateQty(${food.id}, 1)" class="w-9 h-9 bg-orange-500 text-white rounded-xl font-bold flex items-center justify-center shadow-lg shadow-orange-100 active:bg-orange-600">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // تحديث الكميات والحسابات
        function updateQty(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] < 0) cart[id] = 0;
            
            const qtyElement = document.getElementById(`qty-${id}`);
            if(qtyElement) qtyElement.innerText = cart[id];
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            let count = 0;
            for (const id in cart) {
                const food = foods.find(f => f.id == id);
                if(food) {
                    total += food.price * cart[id];
                    count += cart[id];
                }
            }
            document.getElementById('totalPrice').innerHTML = `${total.toLocaleString()} <span class="text-xs">د.ع</span>`;
            document.getElementById('itemCount').innerText = `${count} قطع`;
        }

        // الفلترة والبحث
        function filterMenu() {
            const text = document.getElementById('searchInput').value.toLowerCase();
            renderMenu(foods.filter(f => f.name.includes(text)));
        }

        function filterType(type) {
            const btns = document.querySelectorAll('.no-scrollbar button');
            btns.forEach(b => {
                b.classList.remove('bg-orange-500', 'text-white');
                b.classList.add('bg-white', 'text-gray-500');
            });
            event.target.classList.replace('bg-white', 'bg-orange-500');
            event.target.classList.replace('text-gray-500', 'text-white');

            if(type === 'all') renderMenu(foods);
            else renderMenu(foods.filter(f => f.type === type));
        }

        // المميزات الإضافية
        function pickLuckyFood() {
            const randomFood = foods[Math.floor(Math.random() * foods.length)];
            alert(`حمادة يگولك جرب: ${randomFood.name} 😋، ماراح تندم!`);
            updateQty(randomFood.id, 1);
            renderMenu();
        }

        function callForBill() {
            const total = document.getElementById('totalPrice').innerText;
            if(total.startsWith("0")) alert("حمادة يگولك: اطلب شي أولاً وبعدين نحاسب! 😂");
            else alert(`جارٍ تحضير الفاتورة بمبلغ ${total}... ثواني ويجيك الكارسون!`);
        }

        function toggleDarkMode() {
            document.getElementById('mainBody').classList.toggle('dark-mode');
        }

        function confirmOrder() {
            if (Object.values(cart).reduce((a, b) => a + b, 0) > 0) {
                document.getElementById('successModal').classList.add('modal-active');
            } else {
                alert("سلتك فارغة يا طيب!");
            }
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('modal-active');
            cart = {};
            renderMenu();
            calculateTotal();
        }

        // التشغيل الأولي
        renderMenu();
    </script>
</body>
</html>
